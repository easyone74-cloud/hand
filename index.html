<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Service Zeit</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0b0e11" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker registriert');
                    })
                    .catch(err => {
                        console.log('❌ Service Worker Fehler:', err);
                    });
            });
        }
    </script>

    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: #0b0e11; padding: 20px; max-width: 600px; margin: 0 auto; color: #e8edf3; min-height: 100vh; }

        .card { background: #1a1f26; padding: 20px; border-radius: 16px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); border: 1px solid #2a3038; }
        .card-title { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .card-subtitle { text-align: center; font-size: 13px; color: #64748b; margin-top: 4px; letter-spacing: 0.3px; }

        .status-bar { background: #11161e; border-radius: 10px; padding: 10px 16px; text-align: center; font-size: 15px; color: #94a3b8; border: 1px solid #1e293b; }
        .status-bar .status-text { font-weight: 500; }

        .pull-container { position: relative; overflow: hidden; }
        .pull-indicator { text-align: center; color: #64748b; font-size: 13px; padding: 8px 0; transform: translateY(-40px); transition: transform 0.2s; }
        .pull-indicator.active { transform: translateY(0); }
        .pull-indicator .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #2a3038; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        input { width: 100%; padding: 14px 16px; background: #11161e; border: 1px solid #2a3038; border-radius: 10px; color: #e8edf3; font-size: 16px; margin-bottom: 10px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.2); }
        input::placeholder { color: #64748b; }

        .btn { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
        .btn:active { transform: scale(0.95); }

        .btn-blue { background: #2563eb; color: white; }
        .btn-blue:hover { background: #3b82f6; }

        .btn-green { background: #16a34a; color: white; }
        .btn-green:hover { background: #22c55e; }

        .btn-red { background: #dc2626; color: white; }
        .btn-red:hover { background: #ef4444; }

        .btn-orange { background: #d97706; color: white; }
        .btn-orange:hover { background: #f59e0b; }

        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2a3038; }
        .btn-ghost:hover { background: #1e293b; }

        .btn-sm { padding: 4px 8px; font-size: 11px; border-radius: 6px; }

        .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

        .entry-actions { display: flex; flex-direction: column; gap: 4px; align-items: stretch; flex-shrink: 0; margin-left: 8px; min-width: 70px; }

        .entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #11161e; border-radius: 10px; margin-bottom: 6px; border: 1px solid #1e293b; transition: border 0.2s; }
        .entry:hover { border-color: #334155; }

        .entry .info { flex: 1; min-width: 0; }
        .entry .name { font-size: 16px; font-weight: 600; color: #f1f5f9; }
        .entry .street { font-size: 13px; color: #94a3b8; margin-top: 1px; }
        .entry .status { font-size: 12px; font-weight: 500; margin-top: 2px; }

        .text-muted { color: #64748b; }
        .text-center { text-align: center; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e11; }
        ::-webkit-scrollbar-thumb { background: #2a3038; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b4654; }

        .badge-running { background: #dc2626; color: white; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; animation: pulse 1.5s infinite; display: inline-block; text-align: center; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .entry-actions .badge-running { text-align: center; }

        .move-buttons { display: flex; gap: 2px; }
        .move-buttons .btn { padding: 2px 6px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-title">🔧 Service Zeit 🔧</div>
        <div class="card-subtitle">© 2026 H. Neuhaus</div>
    </div>

    <div class="status-bar">
        <span id="status" class="status-text">📡 Lade Daten...</span>
    </div>

    <div class="pull-container" id="pullContainer">
        <div class="pull-indicator" id="pullIndicator">
            <span class="spinner"></span> Aktualisiere...
        </div>

        <div class="card">
            <input id="inputName" type="text" placeholder="👤 Kunde / Firma" />
            <input id="inputStreet" type="text" placeholder="📍 Straße / Ort" />
            <div class="row">
                <button class="btn btn-blue" onclick="save()" style="flex:1;">➕ NEUER AUFTRAG</button>
                <button class="btn btn-red" onclick="deleteDay()" style="flex:1;">🗑️ TAG LÖSCHEN</button>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="font-size:17px; font-weight:600; color:#e8edf3;">📋 Aufträge</h3>
                <span id="countBadge" style="background:#1e293b; padding:4px 12px; border-radius:20px; font-size:12px; color:#94a3b8;">0</span>
            </div>
            <div id="entries"></div>
        </div>
    </div>

    <script>
        // ===== SUPABASE =====
        const SUPABASE_URL = "https://whcqneawuvwbyottsvjn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoY3FuZWF3dXZ3YnlvdHRzdmpuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4NDQyMzY3OSwiZXhwIjoyMDk5OTk5Njc5fQ.cqeqbLu6ikrAYvJoSI3BP7F4lwXb--GuLB33xkevQsk";

        const headers = {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        };

        let auftraege = [];
        let refreshInterval = null;

        // ===== HILFSFUNKTIONEN =====
        function jetztLokalISO() {
            const now = new Date();
            const offset = now.getTimezoneOffset();
            const sign = offset > 0 ? '-' : '+';
            const h = String(Math.abs(Math.floor(offset / 60))).padStart(2, '0');
            const m = String(Math.abs(offset % 60)).padStart(2, '0');
            const tz = `${sign}${h}:${m}`;
            const y = now.getFullYear();
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            return `${y}-${mo}-${d}T${hh}:${mm}:${ss}${tz}`;
        }

        function parseDatum(str) {
            if (!str) return null;
            try { return new Date(str); } catch { return null; }
        }

        function dauerAnzeigen(sek) {
            if (!sek || sek < 0) return '0 Min';
            const min = Math.floor(sek / 60);
            const std = Math.floor(min / 60);
            const restMin = min % 60;
            if (std === 0) return `${restMin} Min`;
            if (restMin === 0) return `${std} Std`;
            return `${std} Std ${restMin} Min`;
        }

        function statusColor(status) {
            return status === 0 ? '#94a3b8' : status === 1 ? '#ef4444' : status === 3 ? '#f59e0b' : '#22c55e';
        }

        function statusText(status) {
            return status === 0 ? '⏸ Bereit' : status === 1 ? '🔴 Läuft' : status === 3 ? '⏸ Pausiert' : '✅ Fertig';
        }

        // ===== AUTO-REFRESH =====
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                refreshDataSilent();
            }, 60000);
        }

        function resetAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                startAutoRefresh();
            }
        }

        // ===== DATEN LADEN =====
        async function loadData() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?select=*&order=erstellt_am.asc`, { headers });
                if (res.ok) {
                    auftraege = await res.json();
                    setStatus(`✅ ${auftraege.length} Aufträge geladen`, '#22c55e');
                    renderList();
                } else {
                    setStatus(`❌ Fehler: ${res.status}`, '#ef4444');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        async function refreshDataSilent() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?select=*&order=erstellt_am.asc`, { headers });
                if (res.ok) {
                    auftraege = await res.json();
                    renderList();
                    const heute = new Date().toISOString().slice(0, 10);
                    const rows = auftraege.filter(a => a.tag === heute);
                    document.getElementById('countBadge').textContent = rows.length;
                }
            } catch (e) {}
        }

        // ===== LISTE ANZEIGEN (mit Pause & Verschieben) =====
        function renderList() {
            const container = document.getElementById('entries');
            const heute = new Date().toISOString().slice(0, 10);
            const rows = auftraege.filter(a => a.tag === heute);

            document.getElementById('countBadge').textContent = rows.length;

            if (rows.length === 0) {
                container.innerHTML = `<div class="text-muted" style="text-align:center; padding:20px;">📭 Keine Aufträge für heute</div>`;
                return;
            }

            container.innerHTML = rows.map((a, index) => {
                let dauerText = '';
                let aktiveZeit = a.dauer || 0;

                // Bei laufendem Auftrag: aktuelle Dauer anzeigen (inkl. Pausen)
                if (a.status === 1 && a.startzeit) {
                    const start = parseDatum(a.startzeit);
                    if (start) {
                        const jetzt = new Date();
                        const diff = Math.floor((jetzt - start) / 1000);
                        // Pausen abziehen
                        const pausen = a.pausen_gesamt || 0;
                        const netto = Math.max(0, diff - pausen);
                        dauerText = ` (${dauerAnzeigen(netto)})`;
                    }
                } else if (a.status === 2 && a.dauer) {
                    dauerText = ` (${dauerAnzeigen(a.dauer)})`;
                } else if (a.status === 3 && a.startzeit && a.pausen_gesamt) {
                    // Pausiert: Zeige bisherige Netto-Zeit
                    const start = parseDatum(a.startzeit);
                    if (start) {
                        const jetzt = new Date();
                        const diff = Math.floor((jetzt - start) / 1000);
                        const pausen = a.pausen_gesamt || 0;
                        const netto = Math.max(0, diff - pausen);
                        dauerText = ` (${dauerAnzeigen(netto)})`;
                    }
                }

                let actionsHtml = '';

                // Status 0: Bereit → STARTEN
                if (a.status === 0) {
                    actionsHtml = `
                        <button class="btn btn-green btn-sm" onclick="startJob(${a.id})">▶️ START</button>
                    `;
                }
                // Status 1: Läuft → PAUSE + STOPPEN
                else if (a.status === 1) {
                    actionsHtml = `
                        <button class="btn btn-orange btn-sm" onclick="pauseJob(${a.id})">⏸ PAUSE</button>
                        <button class="btn btn-red btn-sm" onclick="stopJob(${a.id})">⏹ STOP</button>
                    `;
                }
                // Status 3: Pausiert → WEITER + STOPPEN
                else if (a.status === 3) {
                    actionsHtml = `
                        <button class="btn btn-green btn-sm" onclick="resumeJob(${a.id})">▶️ WEITER</button>
                        <button class="btn btn-red btn-sm" onclick="stopJob(${a.id})">⏹ STOP</button>
                    `;
                }
                // Status 2: Fertig → nur Anzeige
                else {
                    actionsHtml = `<span style="color:#22c55e; font-weight:600; font-size:12px;">✔️ Erledigt</span>`;
                }

                // Verschieben-Buttons
                const moveButtons = `
                    <div class="move-buttons">
                        <button class="btn btn-ghost btn-sm" onclick="moveJob(${a.id}, -1)" ${index === 0 ? 'disabled' : ''}>⬆</button>
                        <button class="btn btn-ghost btn-sm" onclick="moveJob(${a.id}, 1)" ${index === rows.length - 1 ? 'disabled' : ''}>⬇</button>
                    </div>
                `;

                return `
                    <div class="entry">
                        <div class="info">
                            <div class="name">${a.kunde}</div>
                            ${a.strasse ? `<div class="street">${a.strasse}</div>` : ''}
                            <div class="status" style="color:${statusColor(a.status)}">
                                ${statusText(a.status)}${dauerText}
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                            <div class="entry-actions" style="flex-direction:row; min-width:unset;">
                                ${actionsHtml}
                                <button class="btn btn-ghost btn-sm" onclick="deleteJob(${a.id})" style="color:#94a3b8;">🗑️</button>
                            </div>
                            ${moveButtons}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== CRUD =====
        async function save() {
            const name = document.getElementById('inputName').value.trim();
            const street = document.getElementById('inputStreet').value.trim();
            if (!name) { setStatus('❌ Bitte Name eingeben!', '#ef4444'); return; }

            const data = {
                kunde: name,
                strasse: street || '',
                status: 0,
                tag: new Date().toISOString().slice(0, 10),
                pausen_gesamt: 0
            };

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    setStatus(`✅ Auftrag erfasst: ${name}`, '#22c55e');
                    document.getElementById('inputName').value = '';
                    document.getElementById('inputStreet').value = '';
                    await loadData();
                } else {
                    setStatus(`❌ Fehler: ${res.status}`, '#ef4444');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        // ===== STARTEN =====
        async function startJob(id) {
            try {
                const startzeit = jetztLokalISO();
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ 
                        status: 1, 
                        startzeit, 
                        endzeit: null, 
                        dauer: 0,
                        pausen_gesamt: 0
                    })
                });
                if (res.ok) {
                    setStatus('▶️ Auftrag gestartet', '#22c55e');
                    await loadData();
                } else {
                    setStatus(`❌ Fehler beim Starten: ${res.status}`, '#ef4444');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        // ===== PAUSIEREN =====
        async function pauseJob(id) {
            try {
                // Aktuellen Auftrag laden
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, { headers });
                const data = await res.json();
                if (data.length && data[0].startzeit) {
                    const start = parseDatum(data[0].startzeit);
                    const jetzt = new Date();
                    const diff = Math.floor((jetzt - start) / 1000);
                    // Bisherige Pausen + aktuelle Differenz
                    const altePausen = data[0].pausen_gesamt || 0;
                    const neuePausen = altePausen + diff;

                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, {
                        method: 'PATCH',
                        headers,
                        body: JSON.stringify({ 
                            status: 3,
                            pausen_gesamt: neuePausen,
                            startzeit: jetztLokalISO() // Neuen Startzeitpunkt setzen
                        })
                    });
                    if (updateRes.ok) {
                        setStatus('⏸ Auftrag pausiert', '#f59e0b');
                        await loadData();
                    } else {
                        setStatus(`❌ Fehler beim Pausieren: ${updateRes.status}`, '#ef4444');
                    }
                } else {
                    setStatus('❌ Keine Startzeit gefunden', '#ef4444');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        // ===== WEITER (Resume) =====
        async function resumeJob(id) {
            try {
                // Aktuellen Auftrag laden
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, { headers });
                const data = await res.json();
                if (data.length) {
                    // Neue Startzeit setzen (für die nächste Phase)
                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, {
                        method: 'PATCH',
                        headers,
                        body: JSON.stringify({ 
                            status: 1,
                            startzeit: jetztLokalISO()
                        })
                    });
                    if (updateRes.ok) {
                        setStatus('▶️ Auftrag fortgesetzt', '#22c55e');
                        await loadData();
                    } else {
                        setStatus(`❌ Fehler beim Fortsetzen: ${updateRes.status}`, '#ef4444');
                    }
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        // ===== STOPPEN =====
        async function stopJob(id) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, { headers });
                const data = await res.json();
                if (data.length && data[0].startzeit) {
                    const start = parseDatum(data[0].startzeit);
                    const end = new Date();
                    // Gesamtzeit minus Pausen
                    const gesamt = Math.floor((end - start) / 1000);
                    const pausen = data[0].pausen_gesamt || 0;
                    const netto = Math.max(0, gesamt - pausen);
                    const endzeit = jetztLokalISO();

                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, {
                        method: 'PATCH',
                        headers,
                        body: JSON.stringify({ status: 2, endzeit, dauer: netto })
                    });
                    if (updateRes.ok) {
                        setStatus(`⏹ Auftrag gestoppt (${dauerAnzeigen(netto)})`, '#f59e0b');
                        await loadData();
                    } else {
                        setStatus(`❌ Fehler beim Stoppen: ${updateRes.status}`, '#ef4444');
                    }
                } else {
                    setStatus('❌ Keine Startzeit gefunden', '#ef4444');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        // ===== VERSCHIEBEN =====
        async function moveJob(id, direction) {
            try {
                const heute = new Date().toISOString().slice(0, 10);
                const todayJobs = auftraege.filter(a => a.tag === heute);
                const currentIndex = todayJobs.findIndex(a => a.id === id);
                if (currentIndex === -1) return;
                const newIndex = currentIndex + direction;
                if (newIndex < 0 || newIndex >= todayJobs.length) return;

                // IDs der beiden zu tauschenden Aufträge
                const currentJob = todayJobs[currentIndex];
                const otherJob = todayJobs[newIndex];

                // Temporäre Reihenfolge speichern – wir tauschen die erstellt_am Werte
                const temp = currentJob.erstellt_am;
                const update1 = fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${currentJob.id}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ erstellt_am: otherJob.erstellt_am })
                });
                const update2 = fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${otherJob.id}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ erstellt_am: temp })
                });

                await Promise.all([update1, update2]);
                setStatus('⬆⬇ Reihenfolge geändert', '#60a5fa');
                await loadData();
            } catch (e) {
                setStatus(`❌ Fehler beim Verschieben: ${e.message}`, '#ef4444');
            }
        }

        // ===== LÖSCHEN =====
        async function deleteJob(id) {
            if (!confirm('Diesen Auftrag wirklich löschen?')) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, { method: 'DELETE', headers });
                setStatus('🗑️ Auftrag gelöscht', '#f59e0b');
                await loadData();
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        async function deleteDay() {
            if (!confirm('Alle Aufträge von HEUTE löschen?')) return;
            const heute = new Date().toISOString().slice(0, 10);
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/auftraege?tag=eq.${heute}`, { method: 'DELETE', headers });
                setStatus('🗑️ Tag gelöscht', '#f59e0b');
                await loadData();
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, '#ef4444');
            }
        }

        function setStatus(msg, color) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.color = color;
        }

        // ===== PULL-TO-REFRESH =====
        let touchStartY = 0;
        let isPulling = false;
        const pullThreshold = 80;

        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (!isPulling) return;
            const diff = e.touches[0].clientY - touchStartY;
            const indicator = document.getElementById('pullIndicator');
            if (diff > pullThreshold) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        });

        document.addEventListener('touchend', () => {
            if (!isPulling) return;
            isPulling = false;
            const indicator = document.getElementById('pullIndicator');
            if (indicator.classList.contains('active')) {
                indicator.classList.remove('active');
                setStatus('🔄 Aktualisiere...', '#60a5fa');
                loadData().then(() => {
                    resetAutoRefresh();
                });
            }
        });

        // ===== START =====
        loadData();
        startAutoRefresh();
    </script>

</body>
</html>
