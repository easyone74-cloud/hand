<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandwerkerZeit</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f5f5; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .dark { background: #1e1e1e; color: white; }
        .dark .status { color: #aaa; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-orange { background: #fd7e14; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 14px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .entry { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
        .entry .info { flex: 1; }
        .entry .name { font-weight: bold; font-size: 18px; }
        .entry .street { font-size: 14px; color: #aaa; }
        .entry .status { font-size: 14px; }
        .mt-10 { margin-top: 10px; }
        .text-center { text-align: center; }
        .text-muted { color: #666; }
        .flex { display: flex; gap: 10px; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- TITEL -->
    <div class="card text-center">
        <h1>🔧 HandwerkerZeit</h1>
    </div>

    <!-- STATUS -->
    <div id="status" class="card text-center text-muted">Lade Daten...</div>

    <!-- EINGABE -->
    <div class="card">
        <input id="inputName" type="text" placeholder="Kunde / Firma" />
        <input id="inputStreet" type="text" placeholder="Straße / Ort" />
        <div class="row">
            <button class="btn-blue" onclick="save()">➕ NEUER AUFTRAG</button>
            <button class="btn-red" onclick="deleteDay()">🗑️ TAG LÖSCHEN</button>
            <button class="btn-orange" onclick="sync()">🔄 SYNC</button>
        </div>
    </div>

    <!-- LISTE -->
    <div id="list" class="card">
        <h3>📋 Aufträge</h3>
        <div id="entries"></div>
    </div>

    <script>
        // ===== SUPABASE =====
        const SUPABASE_URL = "https://whcqneawuvwbyottsvjn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoY3FuZWF3dXZ3YnlvdHRzdmpuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4NDQyMzY3OSwiZXhwIjoyMDk5OTk5Njc5fQ.cqeqbLu6ikrAYvJoSI3BP7F4lwXb--GuLB33xkevQsk";

        const headers = {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        };

        let auftraege = [];

        // ===== HILFSFUNKTIONEN (mit lokaler Zeit) =====
        function jetztLokalISO() {
            // Lokale Zeit im ISO-Format (mit Zeitzonen-Offset)
            const now = new Date();
            const offset = now.getTimezoneOffset();
            const offsetHours = Math.abs(Math.floor(offset / 60));
            const offsetMinutes = Math.abs(offset % 60);
            const sign = offset > 0 ? '-' : '+';
            const timezone = `${sign}${String(offsetHours).padStart(2, '0')}:${String(offsetMinutes).padStart(2, '0')}`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}${timezone}`;
        }

        function parseDatum(str) {
            if (!str) return null;
            try {
                return new Date(str);
            } catch {
                return null;
            }
        }

        function dauerAnzeigen(sekunden) {
            if (!sekunden || sekunden < 0) return '0 Min';
            const min = Math.floor(sekunden / 60);
            if (min < 60) return `${min} Min`;
            const std = Math.floor(min / 60);
            const rest = min % 60;
            if (rest === 0) return `${std}h`;
            return `${std}h ${rest} Min`;
        }

        // ===== DATEN LADEN =====
        async function loadData() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?select=*&order=erstellt_am.asc`, { headers });
                if (res.ok) {
                    auftraege = await res.json();
                    setStatus(`✅ ${auftraege.length} Aufträge geladen`, 'green');
                    renderList();
                } else {
                    setStatus(`❌ Fehler: ${res.status}`, 'red');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, 'red');
            }
        }

        // ===== LISTE ANZEIGEN =====
        function renderList() {
            const container = document.getElementById('entries');
            const heute = new Date().toISOString().slice(0, 10);
            const rows = auftraege.filter(a => a.tag === heute);

            if (rows.length === 0) {
                container.innerHTML = `<div class="text-muted">📭 Keine Aufträge für heute</div>`;
                return;
            }

            container.innerHTML = rows.map(a => {
                const statusMap = {
                    0: { text: '⏸ Bereit', color: '#aaa' },
                    1: { text: '🔴 Läuft', color: '#ff6b6b' },
                    2: { text: '✅ Fertig', color: '#51cf66' }
                };
                const s = statusMap[a.status] || statusMap[0];

                let dauerText = '';
                if (a.status === 1 && a.startzeit) {
                    const start = parseDatum(a.startzeit);
                    if (start) {
                        const jetzt = new Date();
                        const diff = Math.floor((jetzt - start) / 1000);
                        if (diff > 0) {
                            dauerText = ` (${dauerAnzeigen(diff)})`;
                        } else {
                            dauerText = ' (0 Min)';
                        }
                    }
                } else if (a.status === 2 && a.dauer) {
                    dauerText = ` (${dauerAnzeigen(a.dauer)})`;
                }

                let actionBtn = '';
                if (a.status === 0) {
                    actionBtn = `<button class="btn-green btn-sm" onclick="startJob(${a.id})">▶️ STARTEN</button>`;
                } else if (a.status === 1) {
                    actionBtn = `<button class="btn-red btn-sm" onclick="stopJob(${a.id})">⏹ STOPPEN</button>`;
                } else {
                    actionBtn = `<span style="color:#51cf66">✔️ Erledigt</span>`;
                }

                return `
                    <div class="entry dark">
                        <div class="info">
                            <div class="name">${a.kunde}</div>
                            <div class="street">${a.strasse || ''}</div>
                            <div class="status" style="color:${s.color}">${s.text}${dauerText}</div>
                        </div>
                        <div class="flex">
                            ${actionBtn}
                            <button class="btn-red btn-sm" onclick="deleteJob(${a.id})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== SPEICHERN =====
        async function save() {
            const name = document.getElementById('inputName').value.trim();
            const street = document.getElementById('inputStreet').value.trim();
            if (!name) { setStatus('❌ Bitte Name eingeben!', 'red'); return; }

            const data = {
                kunde: name,
                strasse: street,
                status: 0,
                tag: new Date().toISOString().slice(0, 10)
            };

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    setStatus(`✅ Auftrag erfasst: ${name}`, 'green');
                    document.getElementById('inputName').value = '';
                    document.getElementById('inputStreet').value = '';
                    await loadData();
                } else {
                    setStatus(`❌ Fehler: ${res.status}`, 'red');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, 'red');
            }
        }

        // ===== STARTEN =====
        async function startJob(id) {
            try {
                const startzeit = jetztLokalISO();
                console.log(`▶️ Starte Auftrag ${id} um ${startzeit}`);
                
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ 
                        status: 1, 
                        startzeit: startzeit,
                        endzeit: null,
                        dauer: 0
                    })
                });
                
                if (res.ok) {
                    setStatus('▶️ Auftrag gestartet', 'green');
                    await loadData();
                } else {
                    setStatus(`❌ Fehler beim Starten: ${res.status}`, 'red');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, 'red');
            }
        }

        // ===== STOPPEN =====
        async function stopJob(id) {
            try {
                // Erst den aktuellen Auftrag laden
                const res = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, { headers });
                const data = await res.json();
                
                if (data.length && data[0].startzeit) {
                    const start = parseDatum(data[0].startzeit);
                    if (!start) {
                        setStatus('❌ Keine gültige Startzeit', 'red');
                        return;
                    }
                    
                    const end = new Date();
                    const dauer = Math.floor((end - start) / 1000);
                    const endzeit = jetztLokalISO();
                    
                    console.log(`⏹ Stoppe Auftrag ${id}, Dauer: ${dauer}s`);
                    console.log(`Start: ${data[0].startzeit}, Ende: ${endzeit}`);
                    
                    const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, {
                        method: 'PATCH',
                        headers,
                        body: JSON.stringify({ 
                            status: 2, 
                            endzeit: endzeit, 
                            dauer: dauer 
                        })
                    });
                    
                    if (updateRes.ok) {
                        setStatus(`⏹ Auftrag gestoppt (${dauerAnzeigen(dauer)})`, 'orange');
                        await loadData();
                    } else {
                        setStatus(`❌ Fehler beim Stoppen: ${updateRes.status}`, 'red');
                    }
                } else {
                    setStatus('❌ Keine Startzeit gefunden', 'red');
                }
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, 'red');
            }
        }

        // ===== LÖSCHEN (Einzeln) =====
        async function deleteJob(id) {
            if (!confirm('Diesen Auftrag wirklich löschen?')) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/auftraege?id=eq.${id}`, { method: 'DELETE', headers });
                setStatus('🗑️ Auftrag gelöscht', 'orange');
                await loadData();
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, 'red');
            }
        }

        // ===== TAG LÖSCHEN =====
        async function deleteDay() {
            if (!confirm('Alle Aufträge von HEUTE löschen?')) return;
            const heute = new Date().toISOString().slice(0, 10);
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/auftraege?tag=eq.${heute}`, { method: 'DELETE', headers });
                setStatus('🗑️ Tag gelöscht', 'orange');
                await loadData();
            } catch (e) {
                setStatus(`❌ Fehler: ${e.message}`, 'red');
            }
        }

        // ===== SYNC =====
        async function sync() {
            setStatus('🔄 Synchronisiere...', 'blue');
            await loadData();
        }

        // ===== STATUS =====
        function setStatus(msg, color) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.color = color === 'green' ? '#28a745' : color === 'red' ? '#dc3545' : color === 'orange' ? '#fd7e14' : '#007bff';
        }

        // ===== START =====
        loadData();
    </script>

</body>
</html>
